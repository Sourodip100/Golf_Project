<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Impact Golf</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; background: #1e293b; padding: 2rem; border-radius: 12px; }
        button { background-color: #ef4444; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Control Panel</h1>
        
        <div style="background: #334155; padding: 1rem; border-radius: 8px; margin-top: 1rem;">
            <h3>Monthly Draw Engine</h3>
            <p>Execute the monthly draw algorithm to calculate prize pools based on active subscriptions.</p>
            <button id="runDrawBtn">Execute Monthly Draw</button>
            <p id="drawResult" style="margin-top: 1rem; color: #10b981;"></p>
        </div>
    </div>

    <script>
        document.getElementById('runDrawBtn').addEventListener('click', async () => {
            const response = await fetch('http://localhost:3000/api/admin/draw', {
                method: 'POST'
            });
            const data = await response.json();
            if (response.ok) {
                document.getElementById('drawResult').innerText = `Draw executed. Total Pool: $${data[0].total_pool}`;
            }
        });
    </script>
</body>
</html>
